name: Bump Version & Release Tag

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    name: Bump Version
    # Run on manual dispatch or if the push is not a release bump commit to prevent infinite loops
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event.head_commit != null && !startsWith(github.event.head_commit.message, 'chore(release):'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Get all tags/history

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run version bump script
        id: bump
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          IS_MANUAL: ${{ github.event_name == 'workflow_dispatch' }}
        run: node scripts/bump-version.js

      - name: Commit and push version bump
        if: steps.bump.outputs.should_bump == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore(release): bump version to v${{ steps.bump.outputs.new_version }}"
          git push origin main

      - name: Push Git Tag (if release)
        if: steps.bump.outputs.should_bump == 'true' && steps.bump.outputs.should_tag == 'true'
        run: |
          git tag v${{ steps.bump.outputs.new_version }}
          git push origin v${{ steps.bump.outputs.new_version }}
